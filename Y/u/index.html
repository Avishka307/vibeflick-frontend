<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VibeFlick Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-play-app" content="app-id=com.vibeflick.app">
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .logo { font-size: 32px; font-weight: bold; color: #FF3B5C; }
    .msg { margin-top: 16px; color: #aaa; font-size: 14px; }
    .btn {
      margin-top: 24px;
      display: inline-block;
      background: #FF3B5C;
      color: white;
      padding: 12px 32px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div>
    <div class="logo">VibeFlick</div>
    <div class="msg" id="msg">Opening profile...</div>
    <a class="btn" id="storeBtn"
       href="https://play.google.com/store/apps/details?id=com.vibeflick.app"
       style="display:none">
      Get the App
    </a>
  </div>
  <script>
    const path = window.location.pathname;
    const username = path.split('/u/')[1];

    if (username) {
      const intentUrl =
        'intent://u/' + username +
        '#Intent;scheme=vibeflick;package=com.vibeflick.app;end';

      window.location = intentUrl;

      setTimeout(function() {
        document.getElementById('msg').textContent =
          'App install කරලා profile එක බලන්න';
        document.getElementById('storeBtn').style.display = 'inline-block';
      }, 3000);
    } else {
      document.getElementById('msg').textContent = 'Profile not found.';
    }
  </script>
</body>
</html>
